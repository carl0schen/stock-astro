name: Mirror to GitLab

on:
  push:
    branches: [ "main" ] # 如果你的主分支叫 master 請改成 master

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 確保抓取所有歷史紀錄與分支

      - name: Push to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_USERNAME: "carl0schen" # 請替換為實際帳號
          GITLAB_REPO: "stock-astro" # 請替換為 GitLab 上的專案名稱
        run: |
          # 組合含有 Token 的認證網址
          REMOTE_URL="https://oauth2:${GITLAB_TOKEN}@gitlab.com/${GITLAB_USERNAME}/${GITLAB_REPO}.git"

          # 將 GitLab 加入遠端節點
          git remote add gitlab $REMOTE_URL

          # 改用這種方式：將 GitHub 的所有分支與標籤強制推送到 GitLab，避開隱藏的快取節點
          git push gitlab "refs/remotes/origin/*:refs/heads/*" --force
          git push gitlab "refs/tags/*:refs/tags/*" --force
